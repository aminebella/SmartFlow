spring.application.name=Spring App

# Database MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/SmartFlow_db
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# API Docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.url=/v3/api-docs
# Server
server.port=8080
server.servlet.context-path=/api/v1/

# JWT Security
application.security.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.expiration=86400000
application.security.refresh-token.expiration=604800000

# Mail (MailDev local)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=ana
spring.mail.password=ana
spring.mail.properties.mail.smtp.trust=*
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enabled=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.protocol=smtp

# Activation URL
