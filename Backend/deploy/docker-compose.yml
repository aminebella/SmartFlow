version: '3.8'

services:
  postgres-db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: demo_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d demo_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ../backup/data:/var/lib/postgresql/data

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: spring_app
    ports:
      - "8080:8080"
    depends_on:
      postgres-db:
        condition: service_healthy
